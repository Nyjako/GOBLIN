name: Tests Linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential clang

      - name: Run tests
        env:
          CC: ${{ matrix.cc }}
        run: |
          set -e
          mkdir -p build/tests
          for src in tests/*.c; do
            name=$(basename "$src" .c)
            std="c99"
            if [[ "$name" =~ \.c([0-9]+)$ ]]; then
              std="c${BASH_REMATCH[1]}"
              name="${name%.*}"
            fi
            exe="build/tests/$name-$CC"
            "$CC" -Wall -Wextra -pedantic -std="$std" -I. "$src" -o "$exe"
            "$exe"
          done

  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build and run with ASan/LSan
        run: |
          set -e
          mkdir -p build/tests
          for src in tests/*.c; do
            name=$(basename "$src" .c)
            exe="build/tests/$name-asan"
            clang -g -O1 -fsanitize=address -fno-omit-frame-pointer -I. "$src" -o "$exe"
            ASAN_OPTIONS=detect_leaks=1 "$exe"
          done
