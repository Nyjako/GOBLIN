name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Run tests on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: ./test.sh

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: test.cmd